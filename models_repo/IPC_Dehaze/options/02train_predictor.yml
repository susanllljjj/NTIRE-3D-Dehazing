name: 02_smoke_flux
model_type: PredictorModel
scale: 1
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: Smoke_Real_Train
    type: PairedImageDataset
    dataroot_gt: /data_nvme/ljc/smoke_dehaze_flux/train/GT
    dataroot_lq: /data_nvme/ljc/smoke_dehaze_flux/train/hazy

    io_backend:
      type: disk

    use_resize_crop: true
    use_flip: true
    use_rot: true
    gt_size: 256

    # data loader
    use_shuffle: true
    batch_size_per_gpu: 4 # 3080单卡建议4，若报错OutOfMemory则改2
    num_worker_per_gpu: 4
    dataset_enlarge_ratio: 1

  val:
    name: validation
    type: PairedImageDataset
    dataroot_gt: /data_nvme/ljc/smoke_dehaze_flux/train/GT
    dataroot_lq: /data_nvme/ljc/smoke_dehaze_flux/train/hazy

    # --- 关键：请补上下面这两行 ---
    io_backend:
      type: disk

# network structures
network_g:
  type: DehazeTokenNet
  gt_resolution: 256
  norm_type: 'gn'
  act_type: 'silu'
  codebook_params: [64, 1024, 256]
  LQ_stage: true
  code_only: false
  detach_16: true
  frozen_module_keywords: ['quantize', 'decoder', 'after_quant', 'out_conv']

network_hq:
  type: VQGAN
  gt_resolution: 256
  norm_type: 'gn'
  act_type: 'silu'
  codebook_params: [64, 1024, 256]
  LQ_stage: false

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3

# path
path:
  pretrain_network_hq: pretrained_models/vqgan.pth
  pretrain_network_g: pretrained_models/predictor.pth
  pretrain_network_d: pretrained_models/vqgan_d.pth
  strict_load: false

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 2e-5 # 微调步子要小
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [10000, 15000]
    gamma: 0.5

  total_iter: 5000
  warmup_iter: -1

  # 损失函数
  pixel_opt:
    type: L1Loss
    loss_weight: 2.0 # 强化像素级对齐，拉高 PSNR
    reduction: mean

  perceptual_opt:
    type: LPIPSLoss
    loss_weight: !!float 1.0

  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: 0.1

  cross_entropy_opt:
    token_weight: 1

  net_d_iters: 1
  net_d_init_iters: 0

# validation settings
val:
  val_freq: !!float 200
  save_img: true
  metrics:
    psnr:
      type: psnr
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 200
  save_latest_freq: !!float 200      # --- 补上这一行：每 500 次存一个名为 latest 的权重 ---
  show_tf_imgs_freq: !!float 200   # 每 500 次在 TensorBoard 显示一次图片
  use_tb_logger: true

dist_params:
  backend: nccl
  port: 16500

find_unused_parameters: true