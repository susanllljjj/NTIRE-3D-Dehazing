# 1. 实验名称：基于v1微调版继续训练
name: 02_smoke_DehazeO_from_v1_experiment

model_type: PredictorModel
scale: 1
num_gpu: 1
manual_seed: 0

# 2. 数据集路径
datasets:
  train:
    name: DehazeO_IPCO_Train
    type: PairedImageDataset
    dataroot_gt: /data_nvme/ljc/smoke_DehazeO_IPCO/train/GT
    dataroot_lq: /data_nvme/ljc/smoke_DehazeO_IPCO/train/hazy
    io_backend:
      type: disk

    use_resize_crop: true
    use_flip: true
    use_rot: true
    gt_size: 256
    batch_size_per_gpu: 4
    num_worker_per_gpu: 4

  val:
    name: DehazeO_IPCO_Val
    type: PairedImageDataset
    dataroot_gt: /data_nvme/ljc/smoke_DehazeO_IPCO/val/GT
    dataroot_lq: /data_nvme/ljc/smoke_DehazeO_IPCO/val/hazy
    io_backend:
      type: disk

# 3. 网络结构 (必须包含，否则模型无法构建)
network_g:
  type: DehazeTokenNet
  gt_resolution: 256
  norm_type: 'gn'
  act_type: 'silu'
  codebook_params: [64, 1024, 256]
  LQ_stage: true
  code_only: false
  detach_16: true
  frozen_module_keywords: ['quantize', 'decoder', 'after_quant', 'out_conv']

network_hq:
  type: VQGAN
  gt_resolution: 256
  norm_type: 'gn'
  act_type: 'silu'
  codebook_params: [64, 1024, 256]
  LQ_stage: false

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3

# 4. 【核心路径】加载你指定的 v1 微调模型
path:
  pretrain_network_hq: pretrained_models/vqgan.pth
  # 指向你指定的那个 v1 模型
  pretrain_network_g: /home/ljc/IPC-Dehaze/experiments/02_finetune_smoke_predictor/models/net_g_best_.pth
  pretrain_network_d: pretrained_models/vqgan_d.pth
  strict_load: false
  resume_state: ~

# 5. 训练设置
train:
  optim_g:
    type: Adam
    lr: !!float 1e-5
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [5000, 8000]
    gamma: 0.5

  total_iter: 50000
  warmup_iter: -1

  # 损失函数设置
  pixel_opt:
    type: L1Loss
    loss_weight: 2.0
    reduction: mean
  perceptual_opt:
    type: LPIPSLoss
    loss_weight: !!float 1.0
  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: 0.1
  cross_entropy_opt:
    token_weight: 1
  net_d_iters: 1
  net_d_init_iters: 0

# 6. 验证设置
val:
  val_freq: !!float 200
  save_img: true
  metrics:
    psnr:
      type: psnr
      crop_border: 4
      test_y_channel: true

# 7. 日志设置 (解决 KeyError: 'logger' 的关键)
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 200
  save_latest_freq: !!float 200
  show_tf_imgs_freq: !!float 200
  use_tb_logger: true

# 8. 其他设置
dist_params:
  backend: nccl
  port: 16500
find_unused_parameters: true